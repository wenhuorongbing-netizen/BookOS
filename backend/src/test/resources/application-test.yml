spring:
  datasource:
    url: jdbc:h2:mem:bookos-${random.uuid};MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

app:
  seed:
    enabled: true
  cors:
    allowed-origins:
      - http://localhost:5173
  jwt:
    issuer: test-issuer
    secret: bookos-test-secret-bookos-test-secret-bookos-test-secret-1234
    expiration-minutes: 120
