spring:
  datasource:
    url: jdbc:h2:mem:bookos;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

app:
  seed:
    enabled: true
  cors:
    allowed-origins:
      - http://localhost:5173
  jwt:
    issuer: test-issuer
    secret: bookos-test-secret-bookos-test-secret-bookos-test-secret-1234
    expiration-minutes: 120
