services:
  mysql:
    image: mysql:8.4
    container_name: bookos-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bookos}
      MYSQL_USER: ${MYSQL_USER:-bookos}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bookos}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - bookos-mysql-data:/var/lib/mysql

volumes:
  bookos-mysql-data:
