name: BookOS E2E Release Gate

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Playwright suite to run
        type: choice
        required: true
        default: full
        options:
          - full
          - usability

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright ${{ github.event.inputs.suite }} suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Prepare Maven wrapper
        run: chmod +x backend/mvnw

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run selected E2E suite
        working-directory: frontend
        env:
          APP_SEED_ENABLED: 'true'
          JWT_SECRET: bookos-e2e-secret-bookos-e2e-secret-bookos-e2e-secret-1234
        run: |
          if [ "${{ github.event.inputs.suite }}" = "usability" ]; then
            npm run e2e:usability
          else
            npm run e2e
          fi
